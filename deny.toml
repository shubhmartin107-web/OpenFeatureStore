[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

vulnerability = "deny"
unmaintained = "deny"
yanked = "deny"
notice = "deny"

[licenses]
unlicensed = "deny"
allow-osi-fsf-free = "neither"
default = "deny"

allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"

[sources]
allow-org = ["github"]

[advisories.ignore]
# Add advisory IDs here with a comment explaining why the risk is accepted.
# Example:
# RUSTSEC-2023-0001 = { reason = "mitigated because ..." }
