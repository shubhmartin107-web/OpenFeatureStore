syntax = "proto3";
package feast.core;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "feast/core/DataSource.proto";
import "feast/core/Feature.proto";
import "feast/core/FeatureView.proto";
import "feast/core/Transformation.proto";
import "feast/core/Aggregation.proto";

message StreamFeatureView {
  StreamFeatureViewSpec spec = 1;
  StreamFeatureViewMeta meta = 2;
}

message StreamFeatureViewSpec {
  string name = 1;
  string project = 2;
  repeated string entities = 3;
  repeated FeatureSpecV2 features = 4;
  map<string, string> tags = 5;
  google.protobuf.Duration ttl = 6;
  DataSource batch_source = 7;
  bool online = 8;
  DataSource stream_source = 9;
  string description = 10;
  string owner = 11;
  repeated FeatureSpecV2 entity_columns = 12;
  bool offline = 13;
  string mode = 14;
  string timestamp_field = 15;
  repeated Aggregation aggregations = 16;
  bool enable_tiling = 17;
  google.protobuf.Duration tiling_hop_size = 18;
  FeatureTransformationV2 feature_transformation = 19;
  bool enable_validation = 20;
  string version = 21;
  bool disabled = 22;
}

message StreamFeatureViewMeta {
  google.protobuf.Timestamp created_timestamp = 1;
  google.protobuf.Timestamp last_updated_timestamp = 2;
  int32 current_version_number = 3;
  string version_id = 4;
  FeatureViewState state = 5;
}
