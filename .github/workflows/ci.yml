name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: 29.3

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Install system deps (cmake for DuckDB bundled)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake

      - name: Install protoc
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> "$GITHUB_PATH"
          echo "PROTOC=/tmp/protoc/bin/protoc" >> "$GITHUB_ENV"

      - name: cargo check
        run: cargo check --workspace --exclude ofs-python

      - name: cargo clippy
        run: cargo clippy --workspace --exclude ofs-python -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system deps (cmake for DuckDB bundled)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake

      - name: Install protoc
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> "$GITHUB_PATH"
          echo "PROTOC=/tmp/protoc/bin/protoc" >> "$GITHUB_ENV"

      - name: cargo test
        run: cargo test --workspace --exclude ofs-python

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  deny:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
