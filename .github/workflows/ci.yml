name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: 29.3
  DUCKDB_VERSION: 1.1.0

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Install protoc
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> "$GITHUB_PATH"
          echo "PROTOC=/tmp/protoc/bin/protoc" >> "$GITHUB_ENV"

      - name: Install DuckDB library
        run: |
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip" -o /tmp/duckdb-lib.zip
          mkdir -p /tmp/duckdb-lib
          unzip -o /tmp/duckdb-lib.zip -d /tmp/duckdb-lib
          echo "DUCKDB_LIB_DIR=/tmp/duckdb-lib" >> "$GITHUB_ENV"

      - name: cargo check
        run: cargo check --workspace --exclude ofs-python

      - name: cargo clippy
        run: cargo clippy --workspace --exclude ofs-python -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install protoc
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> "$GITHUB_PATH"
          echo "PROTOC=/tmp/protoc/bin/protoc" >> "$GITHUB_ENV"

      - name: Install DuckDB library
        run: |
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip" -o /tmp/duckdb-lib.zip
          mkdir -p /tmp/duckdb-lib
          unzip -o /tmp/duckdb-lib.zip -d /tmp/duckdb-lib
          echo "DUCKDB_LIB_DIR=/tmp/duckdb-lib" >> "$GITHUB_ENV"

      - name: cargo test
        run: cargo test --workspace --exclude ofs-python
        env:
          LD_LIBRARY_PATH: /tmp/duckdb-lib
          LD_RUN_PATH: /tmp/duckdb-lib

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  deny:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          arguments: --manifest-path Cargo.toml
